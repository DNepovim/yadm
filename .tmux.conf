set -g default-terminal "tmux-256color"
set -g extended-keys always

# --- General Config ---
# Set prefix to Ctrl+a (assuming you mapped Caps Lock to Ctrl in your OS)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

set -g status on

# 2. Ensure pane borders aren't taking up the bottom line
# set -g pane-border-status off

# Use Vi-style keys in Copy Mode
setw -g mode-keys vi

# Enable mouse mode (optional but helpful)
set -g mouse on

# Optional: Ensure windows start numbering at 1 (default is 0)
# This makes Ctrl+1 map to the first tab, Ctrl+2 to the second, etc.
set -g base-index 1
setw -g pane-base-index 1

# tmux plugin manager
set -g @plugin 'tmux-plugins/tpm'

set -g @plugin 'tmux-plugins/tmux-ressurect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'alexwforsythe/tmux-which-key'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'omerxx/tmux-sessionx'

# Auto save and auto restore sessions
set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'

# Allow Shift+Enter to work (Kitty/Ghostty sends \e[13;2u for Shift+Enter)
bind -n S-Enter send-keys "\e[13;2u"

# Use 'v' to begin selection (like Visual Mode in Vim)
bind-key -T copy-mode-vi v send-keys -X begin-selection

# Use 'y' to copy selection (like Yank in Vim)
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Optional: Copy to system clipboard (requires xclip or pbcopy)
# This lets you paste into other apps like your browser
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy" # for macOS
# bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard" # for Linux

# Kill pane without confirm dialog
bind-key x kill-pane

# --- Window (Tab) Management ---
# New tab: Prefix + t
bind t new-window

# Window switching (no prefix)
bind -n C-S-h previous-window
bind -n C-S-l next-window
bind -n C-1 select-window -t 1
bind -n C-2 select-window -t 2
bind -n C-3 select-window -t 3
bind -n C-4 select-window -t 4
bind -n C-5 select-window -t 5
bind -n C-6 select-window -t 6
bind -n C-7 select-window -t 7
bind -n C-8 select-window -t 8
bind -n C-9 select-window -t 9

# Session switching (no prefix) — briefly show status bar with session name
# bind -n C-S-j switch-client -n \; set -g status on \; run-shell -b "sleep 5 && tmux set -g status off"
# bind -n C-S-k switch-client -p \; set -g status on \; run-shell -b "sleep 5 && tmux set -g status off"

bind -n C-S-j switch-client -n \;
bind -n C-S-k switch-client -p \;

# Session launcher (tmux-sessionx)
set -g @sessionx-bind 'w'
bind -n C-w run-shell "~/.tmux/plugins/tmux-sessionx/scripts/sessionx.sh"

# Create new session with Prefix + Shift + s
# -I "#S" is the current session name, which we replace with a new name
bind S command-prompt -p "Session name:" "command-prompt -p 'Directory:' 'new-session -s \"%1\" -c \"%%\"'"


# --- Pane Splitting ---
# Split horizontally: Prefix + s
bind v split-window -v -c "#{pane_current_path}"

# Split vertically: Prefix + v
bind s split-window -h -c "#{pane_current_path}"

# --- Pane Navigation (h, k, ;, j) ---
# Move to left/top/right/bottom pane
bind h select-pane -L
bind k select-pane -U
unbind l
bind l select-pane -R
bind j select-pane -D

# --- Utilities ---
# Easy config reload: Prefix + r
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"


# --- Pane Navigation (Ctrl + h/j/k/l) ---
# No prefix required to move between panes
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
